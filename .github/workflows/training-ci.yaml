name: Training Pipeline CI

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'configs/**'
      - 'docker/**'
      - 'requirements.txt'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'configs/**'
      - 'requirements.txt'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/22navyakumar/aesthetic_hub/training

jobs:
  test:
    name: Run unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run tests
        run: pytest tests/ -v --tb=short

  build-and-push:
    name: Build and push Docker image
    needs: test
    runs-on: ubuntu-latest
    # Only build on push to main, not on PRs
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.jupyter-torch-mlflow-cuda
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  notify-failure:
    name: Notify on failure
    needs: [test, build-and-push]
    runs-on: ubuntu-latest
    if: failure()
    steps:
      - name: Log failure summary
        run: |
          echo "Training pipeline CI failed"
          echo "Commit:  ${{ github.sha }}"
          echo "Branch:  ${{ github.ref_name }}"
          echo "Actor:   ${{ github.actor }}"
          echo "Run URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
      # Uncomment and add SLACK_WEBHOOK_URL secret to enable Slack alerts:
      # - name: Notify Slack
      #   uses: 8398a7/action-slack@v3
      #   with:
      #     status: failure
      #     text: "Training CI failed on ${{ github.ref_name }} by ${{ github.actor }}"
      #     webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
