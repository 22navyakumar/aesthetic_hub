name: Scoring Service CI

on:
  push:
    branches: [main, scoring_service]
    paths:
      - 'scoring_service/**'
  pull_request:
    branches: [main]
    paths:
      - 'scoring_service/**'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/22navyakumar/aesthetic-scoring-service

jobs:
  build-and-push:
    name: Build and push scoring service image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./scoring_service
          file: scoring_service/Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
