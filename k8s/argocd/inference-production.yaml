# ArgoCD Application: Production
# Deploys k8s/production Helm chart to aesthetic-hub namespace.
# promote-model workflow syncs this app after canary observation window passes.
# allowEmpty: false prevents accidental wipe of the production deployment.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: aes-prod
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: aesthetic-hub
    track: production
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  project: default
  source:
    repoURL: https://github.com/22navyakumar/aesthetic_hub
    path: k8s/production
    targetRevision: HEAD
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: aesthetic-hub
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=false
  revisionHistoryLimit: 10
