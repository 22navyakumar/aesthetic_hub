# ArgoCD Application: Staging
# Deploys k8s/staging Helm chart to aesthetic-hub-staging namespace.
# promote-model workflow syncs this app after training passes quality gates.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: aes-staging
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: aesthetic-hub
    track: staging
  annotations:
    # sync-wave ensures staging syncs before canary and production
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    repoURL: https://github.com/22navyakumar/aesthetic_hub
    path: k8s/staging
    targetRevision: HEAD
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: aesthetic-hub-staging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
  revisionHistoryLimit: 5
