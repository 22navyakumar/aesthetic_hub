# ArgoCD Application: Canary
# Deploys k8s/canary Helm chart to aesthetic-hub-canary namespace.
# Receives 10% of scoring traffic (weight set in canary/values.yaml).
# promote-model workflow syncs this app when Staging smoke tests pass.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: aes-canary
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: aesthetic-hub
    track: canary
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: default
  source:
    repoURL: https://github.com/22navyakumar/aesthetic_hub
    path: k8s/canary
    targetRevision: HEAD
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: aesthetic-hub-canary
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
  revisionHistoryLimit: 5
