replicaCount: 1

immichServer:
  image:
    repository: ghcr.io/binti-p/immich-server
    tag: main
  url: 'http://immich-server.aesthetic-hub.svc.cluster.local:2283'

aestheticService:
  image:
    repository: ghcr.io/binti-p/aesthetic-service
    tag: main
    pullPolicy: Always
  port: 8000

postgres:
  host: 'immich-postgres.aesthetic-hub.svc.cluster.local'
  port: 5432
  database: 'immich'
  user: 'immich'
  # password via secretKeyRef in deployment.yaml

minio:
  endpointUrl: 'http://minio.platform.svc.cluster.local:9000'
  dataBucket: 'aesthetic-hub-data'
  tritonBucket: 'triton-models'
  modelStage: 'production'

triton:
  enabled: true
  useTriton: true
  image:
    repository: nvcr.io/nvidia/tritonserver
    tag: '24.10-py3'
  port: 8000
  metricsPort: 8002
  modelRepository: 's3://minio.platform.svc.cluster.local:9000/triton-models/production'
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 2000m
      memory: 4Gi

resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 70
