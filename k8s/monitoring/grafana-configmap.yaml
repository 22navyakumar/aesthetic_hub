apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: monitoring
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        url: http://prometheus:9090
        access: proxy
        isDefault: true
        jsonData:
          timeInterval: 30s
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-provider
  namespace: monitoring
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: default
        orgId: 1
        folder: Aesthetic Hub
        type: file
        disableDeletion: false
        updateIntervalSeconds: 30
        options:
          path: /var/lib/grafana/dashboards
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-mlpipeline
  namespace: monitoring
data:
  ml-pipeline-overview.json: |
    {
      "title": "ML Pipeline Dashboard - Training & Inference Monitoring",
      "uid": "aes-mlpipeline",
      "description": "Monitor ML training pipelines, model serving inference latency, and data pipeline throughput",
      "tags": ["ml", "mlflow", "triton", "training", "inference"],
      "timezone": "browser",
      "schemaVersion": 38,
      "version": 1,
      "refresh": "15s",
      "time": { "from": "now-6h", "to": "now" },
      "panels": [
        {
          "id": 1,
          "title": "MLflow Training Jobs Status",
          "type": "stat",
          "gridPos": {"h": 4, "w": 6, "x": 0, "y": 0},
          "targets": [{"expr": "up{job=\"mlflow\"}", "legendFormat": "MLflow"}],
          "fieldConfig": {"defaults": {"mappings": [{"type": "value", "options": {"0": {"text": "DOWN", "color": "red"}, "1": {"text": "UP", "color": "green"}}}]}}
        },
        {
          "id": 2,
          "title": "MLflow Server Availability",
          "type": "gauge",
          "gridPos": {"h": 4, "w": 6, "x": 6, "y": 0},
          "targets": [{"expr": "up{job=\"mlflow\"} * 100", "legendFormat": "Availability %"}],
          "fieldConfig": {"defaults": {"unit": "percent", "max": 100, "min": 0, "thresholds": {"mode": "absolute", "steps": [{"color": "red", "value": null}, {"color": "green", "value": 100}]}}}
        },
        {
          "id": 3,
          "title": "Triton Inference Server Status",
          "type": "stat",
          "gridPos": {"h": 4, "w": 6, "x": 12, "y": 0},
          "targets": [{"expr": "up{job=\"triton\"}", "legendFormat": "Triton"}],
          "fieldConfig": {"defaults": {"mappings": [{"type": "value", "options": {"0": {"text": "DOWN", "color": "red"}, "1": {"text": "UP", "color": "green"}}}]}}
        },
        {
          "id": 12,
          "title": "Model Registry Active Models",
          "type": "stat",
          "gridPos": {"h": 4, "w": 6, "x": 18, "y": 0},
          "targets": [{"expr": "count(mlflow_model_version{stage=\"Production\"}) or vector(0)", "legendFormat": "Production Models"}]
        },
        {
          "id": 4,
          "title": "Model Inference Latency (P99)",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 4},
          "targets": [{"expr": "histogram_quantile(0.99, rate(triton_inference_request_duration_us[5m]))", "legendFormat": "Triton P99 Latency"}],
          "fieldConfig": {"defaults": {"unit": "µs", "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "yellow", "value": 500000}, {"color": "red", "value": 1000000}]}}}
        },
        {
          "id": 5,
          "title": "Model Inference Throughput",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 4},
          "targets": [{"expr": "rate(triton_inference_request_total[5m])", "legendFormat": "Requests/sec"}],
          "fieldConfig": {"defaults": {"unit": "reqps"}}
        },
        {
          "id": 6,
          "title": "Inference Success Rate",
          "type": "gauge",
          "gridPos": {"h": 8, "w": 6, "x": 0, "y": 12},
          "targets": [{"expr": "(sum(rate(triton_inference_request_total{success=\"true\"}[5m])) / sum(rate(triton_inference_request_total[5m]))) * 100", "legendFormat": "Success %"}],
          "fieldConfig": {"defaults": {"unit": "percent", "max": 100, "min": 0, "thresholds": {"mode": "absolute", "steps": [{"color": "red", "value": null}, {"color": "yellow", "value": 90}, {"color": "green", "value": 95}]}}}
        },
        {
          "id": 13,
          "title": "Triton Memory Usage",
          "type": "gauge",
          "gridPos": {"h": 8, "w": 6, "x": 6, "y": 12},
          "targets": [{"expr": "triton_server_memory_usage_bytes / 1024 / 1024 / 1024", "legendFormat": "Memory GB"}],
          "fieldConfig": {"defaults": {"unit": "decgbytes", "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "yellow", "value": 2}, {"color": "red", "value": 3}]}}}
        },
        {
          "id": 7,
          "title": "Inference Error Rate",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 12},
          "targets": [{"expr": "rate(triton_inference_request_total{success=\"false\"}[5m])", "legendFormat": "Errors/sec"}],
          "fieldConfig": {"defaults": {"unit": "reqps", "color": {"mode": "fixed", "fixedColor": "red"}}}
        },
        {
          "id": 14,
          "title": "Inference Queue Depth",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 20},
          "targets": [{"expr": "triton_inference_queue_depth", "legendFormat": "Queue Depth"}],
          "fieldConfig": {"defaults": {"thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "yellow", "value": 50}, {"color": "red", "value": 100}]}}}
        },
        {
          "id": 16,
          "title": "Feature Store Latency (P95)",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 20},
          "targets": [{"expr": "histogram_quantile(0.95, rate(feature_store_request_duration_seconds_bucket[5m]))", "legendFormat": "P95 Latency"}],
          "fieldConfig": {"defaults": {"unit": "s", "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "yellow", "value": 1}, {"color": "red", "value": 2}]}}}
        },
        {
          "id": 10,
          "title": "Data Pipeline Throughput",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 28},
          "targets": [{"expr": "rate(data_pipeline_processed_records[5m])", "legendFormat": "Records/sec"}],
          "fieldConfig": {"defaults": {"unit": "reqps"}}
        },
        {
          "id": 11,
          "title": "Training Job Duration",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 28},
          "targets": [{"expr": "mlflow_training_job_duration_seconds", "legendFormat": "{{job_name}}"}],
          "fieldConfig": {"defaults": {"unit": "s"}}
        },
        {
          "id": 8,
          "title": "Aesthetic Score Distribution",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 36},
          "targets": [
            {"expr": "histogram_quantile(0.5, rate(aesthetic_score_bucket[5m]))", "legendFormat": "P50"},
            {"expr": "histogram_quantile(0.9, rate(aesthetic_score_bucket[5m]))", "legendFormat": "P90"},
            {"expr": "histogram_quantile(0.99, rate(aesthetic_score_bucket[5m]))", "legendFormat": "P99"}
          ]
        },
        {
          "id": 9,
          "title": "Model Prediction Confidence",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 8, "x": 12, "y": 36},
          "targets": [{"expr": "avg(model_prediction_confidence) by (model_version)", "legendFormat": "{{model_version}}"}]
        },
        {
          "id": 15,
          "title": "Model Load Failures (1h)",
          "type": "stat",
          "gridPos": {"h": 8, "w": 4, "x": 20, "y": 36},
          "targets": [{"expr": "increase(triton_model_load_failures_total[1h]) or vector(0)", "legendFormat": "Load Failures"}],
          "fieldConfig": {"defaults": {"thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "red", "value": 1}]}}}
        }
      ]
    }
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-infrastructure
  namespace: monitoring
data:
  infrastructure-overview.json: |
    {
      "title": "Infrastructure Dashboard - Cluster Overview",
      "uid": "aes-infra",
      "description": "Real-time monitoring of Kubernetes cluster health, node resources, and platform services",
      "tags": ["kubernetes", "infrastructure", "cluster"],
      "timezone": "browser",
      "schemaVersion": 38,
      "version": 1,
      "refresh": "30s",
      "time": { "from": "now-6h", "to": "now" },
      "panels": [
        {
          "id": 1,
          "title": "Cluster CPU Usage",
          "type": "gauge",
          "gridPos": {"h": 8, "w": 6, "x": 0, "y": 0},
          "targets": [{"expr": "sum(rate(container_cpu_usage_seconds_total[5m])) / sum(machine_cpu_cores) * 100", "legendFormat": "CPU %"}],
          "fieldConfig": {"defaults": {"unit": "percent", "max": 100, "min": 0, "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "yellow", "value": 70}, {"color": "red", "value": 85}]}}}
        },
        {
          "id": 2,
          "title": "Cluster Memory Usage",
          "type": "gauge",
          "gridPos": {"h": 8, "w": 6, "x": 6, "y": 0},
          "targets": [{"expr": "(1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100", "legendFormat": "Memory %"}],
          "fieldConfig": {"defaults": {"unit": "percent", "max": 100, "min": 0, "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "yellow", "value": 70}, {"color": "red", "value": 85}]}}}
        },
        {
          "id": 3,
          "title": "Node Status",
          "type": "table",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 0},
          "targets": [{"expr": "kube_node_status_condition{condition=\"Ready\",status=\"true\"}", "legendFormat": "{{node}}"}]
        },
        {
          "id": 4,
          "title": "Pod Status (Running)",
          "type": "stat",
          "gridPos": {"h": 4, "w": 6, "x": 0, "y": 8},
          "targets": [{"expr": "count(kube_pod_status_phase{phase=\"Running\"})", "legendFormat": "Running Pods"}],
          "fieldConfig": {"defaults": {"thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}]}}}
        },
        {
          "id": 12,
          "title": "Prometheus Health",
          "type": "stat",
          "gridPos": {"h": 4, "w": 6, "x": 6, "y": 8},
          "targets": [{"expr": "up{job=\"prometheus\"}", "legendFormat": "Prometheus"}],
          "fieldConfig": {"defaults": {"mappings": [{"type": "value", "options": {"0": {"text": "DOWN", "color": "red"}, "1": {"text": "UP", "color": "green"}}}]}}
        },
        {
          "id": 7,
          "title": "Disk Usage",
          "type": "gauge",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 8},
          "targets": [{"expr": "(node_filesystem_size_bytes{fstype=\"ext4\"} - node_filesystem_avail_bytes{fstype=\"ext4\"}) / node_filesystem_size_bytes{fstype=\"ext4\"} * 100", "legendFormat": "{{instance}}"}],
          "fieldConfig": {"defaults": {"unit": "percent", "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "yellow", "value": 70}, {"color": "red", "value": 85}]}}}
        },
        {
          "id": 5,
          "title": "CPU Usage by Namespace",
          "type": "bargauge",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 16},
          "targets": [{"expr": "sum(rate(container_cpu_usage_seconds_total[5m])) by (namespace)", "legendFormat": "{{namespace}}"}],
          "fieldConfig": {"defaults": {"unit": "short"}}
        },
        {
          "id": 6,
          "title": "Memory Usage by Namespace",
          "type": "bargauge",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 16},
          "targets": [{"expr": "sum(container_memory_usage_bytes) by (namespace) / 1024 / 1024", "legendFormat": "{{namespace}}"}],
          "fieldConfig": {"defaults": {"unit": "megabytes"}}
        },
        {
          "id": 8,
          "title": "Network I/O",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 24, "x": 0, "y": 24},
          "targets": [
            {"expr": "sum(rate(container_network_receive_bytes_total[5m]))", "legendFormat": "Receive"},
            {"expr": "sum(rate(container_network_transmit_bytes_total[5m]))", "legendFormat": "Transmit"}
          ],
          "fieldConfig": {"defaults": {"unit": "Bps"}}
        },
        {
          "id": 9,
          "title": "Persistent Volume Usage",
          "type": "piechart",
          "gridPos": {"h": 8, "w": 8, "x": 0, "y": 32},
          "targets": [{"expr": "(kubelet_volume_stats_used_bytes / kubelet_volume_stats_capacity_bytes) * 100", "legendFormat": "{{persistentvolumeclaim}}"}],
          "fieldConfig": {"defaults": {"unit": "percent"}}
        },
        {
          "id": 10,
          "title": "Container Restart Count",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 8, "x": 8, "y": 32},
          "targets": [{"expr": "increase(kube_pod_container_status_restarts_total[1h])", "legendFormat": "{{namespace}}/{{pod}}"}]
        },
        {
          "id": 11,
          "title": "Pod Creation Rate",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 8, "x": 16, "y": 32},
          "targets": [{"expr": "rate(kube_pod_created[5m])", "legendFormat": "Pods/s"}]
        }
      ]
    }
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-cluster
  namespace: monitoring
data:
  cluster-overview.json: |
    {
      "title": "Aesthetic Hub - Cluster Overview",
      "uid": "aes-cluster",
      "tags": ["kubernetes", "aesthetic-hub"],
      "timezone": "browser",
      "schemaVersion": 38,
      "refresh": "30s",
      "panels": [
        {
          "id": 1,
          "title": "Node CPU Usage (%)",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 0},
          "targets": [
            {
              "expr": "100 - (avg by(instance) (rate(node_cpu_seconds_total{mode=\"idle\"}[5m])) * 100)",
              "legendFormat": "{{instance}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "yellow", "value": 70},
                  {"color": "red", "value": 85}
                ]
              }
            }
          }
        },
        {
          "id": 2,
          "title": "Node Memory Usage (%)",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 0},
          "targets": [
            {
              "expr": "(1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100",
              "legendFormat": "{{instance}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "yellow", "value": 70},
                  {"color": "red", "value": 85}
                ]
              }
            }
          }
        },
        {
          "id": 3,
          "title": "Pod Count by Namespace",
          "type": "stat",
          "gridPos": {"h": 4, "w": 8, "x": 0, "y": 8},
          "targets": [
            {
              "expr": "count by(namespace) (kube_pod_status_ready{condition=\"true\"})",
              "legendFormat": "{{namespace}}"
            }
          ]
        },
        {
          "id": 4,
          "title": "Node Disk Usage (%)",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 12},
          "targets": [
            {
              "expr": "(1 - (node_filesystem_avail_bytes{mountpoint=\"/\"} / node_filesystem_size_bytes{mountpoint=\"/\"})) * 100",
              "legendFormat": "{{instance}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "yellow", "value": 70},
                  {"color": "red", "value": 80}
                ]
              }
            }
          }
        },
        {
          "id": 5,
          "title": "Pod Restart Rate",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 12},
          "targets": [
            {
              "expr": "sum by(pod, namespace) (increase(kube_pod_container_status_restarts_total[10m]))",
              "legendFormat": "{{namespace}}/{{pod}}"
            }
          ]
        },
        {
          "id": 6,
          "title": "HPA Replica Count",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 20},
          "targets": [
            {
              "expr": "kube_horizontalpodautoscaler_status_current_replicas",
              "legendFormat": "{{horizontalpodautoscaler}} (current)"
            },
            {
              "expr": "kube_horizontalpodautoscaler_spec_max_replicas",
              "legendFormat": "{{horizontalpodautoscaler}} (max)"
            }
          ]
        },
        {
          "id": 7,
          "title": "Active Alerts",
          "type": "alertlist",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 20},
          "options": {
            "alertName": "",
            "dashboardAlerts": false,
            "maxItems": 20,
            "sortOrder": 1,
            "stateFilter": {"firing": true, "pending": true}
          }
        }
      ]
    }
