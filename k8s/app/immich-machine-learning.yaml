apiVersion: apps/v1
kind: Deployment
metadata:
  name: immich-machine-learning
  namespace: aesthetic-hub
  labels:
    app: immich-machine-learning
spec:
  replicas: 1
  selector:
    matchLabels:
      app: immich-machine-learning
  template:
    metadata:
      labels:
        app: immich-machine-learning
    spec:
      containers:
        - name: immich-machine-learning
          image: ghcr.io/immich-app/immich-machine-learning:release
          env:
            - name: MACHINE_LEARNING_CACHE_FOLDER
              value: /cache
            - name: MACHINE_LEARNING_PRELOAD__CLIP__VISUAL
              value: ViT-L-14__openai
            - name: MACHINE_LEARNING_PRELOAD__CLIP__TEXTUAL
              value: ViT-L-14__openai
            - name: MACHINE_LEARNING_REQUEST_THREADS
              value: "4"
            - name: MACHINE_LEARNING_MODEL_INTER_OP_THREADS
              value: "1"
            - name: MACHINE_LEARNING_MODEL_INTRA_OP_THREADS
              value: "4"
            - name: MACHINE_LEARNING_WORKERS
              value: "1"
            - name: MACHINE_LEARNING_MODEL_TTL
              value: "0"
          ports:
            - containerPort: 3003
              name: http
          volumeMounts:
            - name: model-cache
              mountPath: /cache
          resources:
            requests:
              cpu: 1000m
              memory: 2Gi
            limits:
              cpu: 4000m
              memory: 6Gi
          livenessProbe:
            httpGet:
              path: /ping
              port: 3003
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ping
              port: 3003
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
      volumes:
        - name: model-cache
          persistentVolumeClaim:
            claimName: immich-ml-cache-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: immich-machine-learning
  namespace: aesthetic-hub
  labels:
    app: immich-machine-learning
spec:
  selector:
    app: immich-machine-learning
  ports:
    - name: http
      port: 3003
      targetPort: 3003
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: immich-ml-cache-pvc
  namespace: aesthetic-hub
  labels:
    app: immich-machine-learning
    component: model-cache
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
  storageClassName: local-path
