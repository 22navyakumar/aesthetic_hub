apiVersion: apps/v1
kind: Deployment
metadata:
  name: immich-server
  namespace: aesthetic-hub
  labels:
    app: immich-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: immich-server
  template:
    metadata:
      labels:
        app: immich-server
    spec:
      containers:
        - name: immich-server
          image: ghcr.io/binti-p/immich-server:main
          env:
            # Immich Database Configuration
            - name: DB_HOSTNAME
              value: immich-postgres
            - name: DB_USERNAME
              value: immich
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: immich-postgres-secret
                  key: password
            - name: DB_DATABASE_NAME
              value: immich
            - name: DB_PORT
              value: "5432"
            - name: DB_VECTOR_EXTENSION
              value: vectorchord
            
            # Aesthetic Service Configuration
            - name: AESTHETIC_SERVICE_URL
              value: http://aesthetic-service.aesthetic-hub.svc.cluster.local:8000
            - name: ENABLE_AESTHETIC_SCORING
              value: "true"
            - name: IMMICH_MACHINE_LEARNING_URL
              value: http://immich-machine-learning.aesthetic-hub.svc.cluster.local:3003
            
            # Redis Configuration
            - name: REDIS_HOSTNAME
              value: immich-redis
            - name: REDIS_PORT
              value: "6379"
            
            # Storage Configuration
            - name: UPLOAD_LOCATION
              value: /data
            
            # Server Configuration
            - name: IMMICH_HOST
              value: "0.0.0.0"
            - name: IMMICH_PORT
              value: "2283"
            - name: IMMICH_CONFIG_FILE
              value: /config/immich-config.yaml
            
            # Logging Configuration (Requirements 20.5, 20.6)
            - name: IMMICH_LOG_LEVEL
              value: "log"  # Options: verbose, debug, log, warn, error, fatal (default: log = INFO)
            - name: IMMICH_LOG_FORMAT
              value: "json"  # Options: console, json (default: console)
          
          ports:
            - containerPort: 2283
              name: http
              protocol: TCP
          
          volumeMounts:
            - name: immich-upload-storage
              mountPath: /data
            - name: immich-config
              mountPath: /config
              readOnly: true
          
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 2000m
              memory: 4Gi
          
          livenessProbe:
            httpGet:
              path: /api/server/ping
              port: 2283
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          
          readinessProbe:
            httpGet:
              path: /api/server/ping
              port: 2283
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
      
      volumes:
        - name: immich-upload-storage
          persistentVolumeClaim:
            claimName: immich-upload-pvc
        - name: immich-config
          configMap:
            name: immich-config
---
apiVersion: v1
kind: Service
metadata:
  name: immich-server
  namespace: aesthetic-hub
  labels:
    app: immich-server
spec:
  type: NodePort
  selector:
    app: immich-server
  ports:
    - port: 2283
      targetPort: 2283
      nodePort: 32081
      protocol: TCP
      name: http
