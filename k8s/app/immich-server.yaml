apiVersion: apps/v1
kind: Deployment
metadata:
  name: immich-server
  namespace: aesthetic-hub
spec:
  replicas: 1
  selector:
    matchLabels:
      app: immich-server
  template:
    metadata:
      labels:
        app: immich-server
    spec:
      containers:
        - name: immich-server
          image: ghcr.io/immich-app/immich-server:release
          env:
            - name: DB_HOSTNAME
              value: immich-postgres
            - name: DB_USERNAME
              value: immich
            - name: DB_PASSWORD
              value: immich
            - name: DB_DATABASE_NAME
              value: immich
            - name: REDIS_HOSTNAME
              value: immich-redis
          ports:
            - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: immich-server
  namespace: aesthetic-hub
spec:
  selector:
    app: immich-server
  ports:
    - port: 3000
      targetPort: 3000