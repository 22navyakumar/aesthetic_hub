apiVersion: batch/v1
kind: Job
metadata:
  name: bucket-init
  namespace: platform
spec:
  backoffLimit: 3
  template:
    spec:
      containers:
        - name: bucket-init
          image: minio/mc:latest
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              mc alias set minio http://minio.platform.svc.cluster.local:9000 "$AWS_ACCESS_KEY_ID" "$AWS_SECRET_ACCESS_KEY"
              mc mb --ignore-existing minio/aesthetic-hub-data
              mc mb --ignore-existing minio/mlflow-artifacts
              mc mb --ignore-existing minio/triton-models
              echo keep > /tmp/.keep
              for stage in staging canary production; do
                mc cp /tmp/.keep "minio/triton-models/${stage}/.keep"
                mc cp /models/global_mlp/1/model.onnx "minio/triton-models/${stage}/global_mlp/1/model.onnx"
                mc cp /models/global_mlp/config.pbtxt "minio/triton-models/${stage}/global_mlp/config.pbtxt"
                mc cp /models/personalized_mlp/1/model.onnx "minio/triton-models/${stage}/personalized_mlp/1/model.onnx"
                mc cp /models/personalized_mlp/config.pbtxt "minio/triton-models/${stage}/personalized_mlp/config.pbtxt"
              done
              mc cp /models/personalized_mlp/1/model.onnx minio/triton-models/models/global/personalized_mlp.onnx
              mc ls minio
              mc ls --recursive minio/triton-models
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: accesskey
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: secretkey
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: accesskey
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: secretkey
          volumeMounts:
            - name: triton-models
              mountPath: /models
              readOnly: true
      nodeSelector:
        kubernetes.io/hostname: node1
      volumes:
        - name: triton-models
          hostPath:
            path: /home/cc/aesthetic_hub/triton-models
            type: Directory
      restartPolicy: OnFailure
