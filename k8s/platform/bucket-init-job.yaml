apiVersion: batch/v1
kind: Job
metadata:
  name: bucket-init
  namespace: platform
spec:
  backoffLimit: 3
  template:
    spec:
      containers:
        - name: bucket-init
          image: minio/mc:latest
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              mc alias set minio http://minio.platform.svc.cluster.local:9000 "$AWS_ACCESS_KEY_ID" "$AWS_SECRET_ACCESS_KEY"
              mc mb --ignore-existing minio/aesthetic-hub-data
              mc mb --ignore-existing minio/mlflow-artifacts
              mc mb --ignore-existing minio/triton-models
              echo keep > /tmp/.keep
              mc cp /tmp/.keep minio/triton-models/staging/.keep
              mc cp /tmp/.keep minio/triton-models/canary/.keep
              mc cp /tmp/.keep minio/triton-models/production/.keep
              mc ls minio
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: accesskey
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: secretkey
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: accesskey
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: secretkey
      restartPolicy: OnFailure
