apiVersion: batch/v1
kind: Job
metadata:
  name: bucket-init
  namespace: aesthetic-hub
spec:
  template:
    spec:
      containers:
        - name: bucket-init
          image: python:3.11-slim
          command: ["sh", "-c"]
          args:
            - |
              pip install --quiet minio pyarrow &&
              python3 /scripts/bucket_init.py
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: accesskey
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: secretkey
          volumeMounts:
            - name: scripts
              mountPath: /scripts
            - name: model-files
              mountPath: /models
              readOnly: true
      volumes:
        - name: scripts
          configMap:
            name: bucket-init-script
        - name: model-files
          hostPath:
            path: /root/aesthetic_hub/k8s/models
            type: Directory
      restartPolicy: OnFailure
