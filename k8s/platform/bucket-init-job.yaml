apiVersion: batch/v1
kind: Job
metadata:
  name: bucket-init
  namespace: platform
spec:
  template:
    spec:
      initContainers:
        - name: wait-for-minio
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for MinIO to be ready..."
              until wget -q --spider http://minio.platform.svc.cluster.local:9000/minio/health/ready; do
                echo "MinIO not ready yet, waiting 5s..."
                sleep 5
              done
              echo "MinIO is ready!"
      containers:
        - name: bucket-init
          image: python:3.11-slim
          command: ["sh", "-c"]
          args:
            - |
              pip install --quiet minio pyarrow &&
              python3 /scripts/bucket_init.py
          env:
            - name: MINIO_ROOT_USER
              value: minioadmin
            - name: MINIO_ROOT_PASSWORD
              value: minioadmin
          volumeMounts:
            - name: scripts
              mountPath: /scripts
            - name: model-files
              mountPath: /models
              readOnly: true
      volumes:
        - name: scripts
          configMap:
            name: bucket-init-script
        - name: model-files
          hostPath:
            path: /root/aesthetic_hub/k8s/models
            type: Directory
      restartPolicy: OnFailure
