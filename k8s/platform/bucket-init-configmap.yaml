apiVersion: v1
kind: ConfigMap
metadata:
  name: bucket-init-script
  namespace: aesthetic-hub
data:
  bucket_init.py: |
    """
    MinIO bucket initialization for aesthetic-hub.
    Creates buckets and downloads initial Triton models from GitHub.
    """
    import json
    import logging
    import os
    import sys
    import urllib.request
    from datetime import datetime, timezone
    from io import BytesIO
    from pathlib import Path

    import pyarrow as pa
    import pyarrow.parquet as pq
    from minio import Minio

    logging.basicConfig(level=logging.INFO, format="%(levelname)s: %(message)s")
    log = logging.getLogger(__name__)

    # GitHub repo for model files
    GITHUB_REPO = "https://raw.githubusercontent.com/binti-p/immich/main"
    TRITON_MODELS_BASE = f"{GITHUB_REPO}/triton-models"
    BOOTSTRAP_PTH_URL = f"{GITHUB_REPO}/aesthetic/pipelines/batch/bootstrap_personalized_model.pth"

    # MinIO config
    MINIO_HOST = "minio.platform.svc.cluster.local:9000"
    MINIO_USER = os.environ.get("MINIO_ROOT_USER", "minioadmin")
    MINIO_PASSWORD = os.environ.get("MINIO_ROOT_PASSWORD", "minioadmin")
    BUCKET_DATA = "aesthetic-hub-data"
    BUCKET_TRITON = "triton-models"

    # Bootstrap version
    BOOTSTRAP_VERSION = "v0000-00-00"


    def get_minio_client() -> Minio:
        return Minio(MINIO_HOST, access_key=MINIO_USER, secret_key=MINIO_PASSWORD, secure=False)


    def create_bucket(client: Minio):
        """Create buckets if they don't exist."""
        for bucket in [BUCKET_DATA, BUCKET_TRITON]:
            if not client.bucket_exists(bucket):
                client.make_bucket(bucket)
                log.info(f"✓ Created bucket: {bucket}")
            else:
                log.info(f"✓ Bucket already exists: {bucket}")


    def download_and_upload_triton_models(client: Minio):
        """Download Triton models from GitHub and upload to MinIO."""
        log.info("\nDownloading and uploading Triton models...")
        
        environments = ["canary", "staging", "production"]
        model_configs = [
            ("global_mlp", "1/model.onnx"),
            ("global_mlp", "config.pbtxt"),
            ("personalized_mlp", "1/model.onnx"),
            ("personalized_mlp", "config.pbtxt"),
        ]
        
        for env in environments:
            for model_type, file_path in model_configs:
                github_url = f"{TRITON_MODELS_BASE}/{model_type}/{file_path}"
                minio_path = f"{env}/{model_type}/{file_path}"
                
                try:
                    log.info(f"  Downloading {github_url}")
                    with urllib.request.urlopen(github_url) as response:
                        data = response.read()
                    
                    # Upload to MinIO
                    client.put_object(
                        BUCKET_TRITON,
                        minio_path,
                        BytesIO(data),
                        len(data)
                    )
                    log.info(f"  ✓ Uploaded {minio_path}")
                    
                except Exception as e:
                    log.warning(f"  ✗ Failed to download/upload {github_url}: {e}")
        
        log.info("✓ Triton models upload complete")


    def download_and_upload_pytorch_model(client: Minio, version: str):
        """Download bootstrap PyTorch model from GitHub and upload to MinIO."""
        log.info(f"\nDownloading and uploading PyTorch model to models/{version}/...")
        
        try:
            log.info(f"  Downloading {BOOTSTRAP_PTH_URL}")
            with urllib.request.urlopen(BOOTSTRAP_PTH_URL) as response:
                data = response.read()
            
            minio_path = f"models/{version}/best_personalized_model.pth"
            client.put_object(
                BUCKET_DATA,
                minio_path,
                BytesIO(data),
                len(data)
            )
            log.info(f"  ✓ Uploaded {minio_path}")
            
        except Exception as e:
            log.warning(f"  ✗ Failed to download/upload PyTorch model: {e}")
        
        log.info("✓ PyTorch model upload complete")


    def create_directory_structure(client: Minio):
        """Create placeholder files for directory structure."""
        log.info("\nCreating directory structure...")
        
        placeholder = json.dumps({"placeholder": True}).encode()
        directories = [
            "production-sim/interactions/.placeholder",
            "production-sim/inference-log/.placeholder",
            f"models/{BOOTSTRAP_VERSION}/.placeholder",
            f"datasets/{BOOTSTRAP_VERSION}/.placeholder"
        ]
        
        for path in directories:
            client.put_object(BUCKET_DATA, path, BytesIO(placeholder), len(placeholder))
        
        log.info("✓ Created directory structure")


    def create_bootstrap_data(client: Minio, version: str):
        """Create bootstrap metadata files."""
        log.info(f"\nCreating bootstrap data for {version}...")
        
        # Bootstrap model_card.json
        model_card = {
            "version": version,
            "created_at": datetime.now(timezone.utc).isoformat(),
            "model_type": "personalized_mlp",
            "status": "bootstrap"
        }
        
        model_card_key = f"models/{version}/model_card.json"
        client.put_object(
            BUCKET_DATA,
            model_card_key,
            BytesIO(json.dumps(model_card, indent=2).encode()),
            len(json.dumps(model_card, indent=2).encode()),
            content_type="application/json",
        )
        log.info(f"  ✓ Created {model_card_key}")
        
        # Bootstrap user_embeddings.parquet (empty)
        schema = pa.schema([
            pa.field("user_id", pa.string()),
            pa.field("embedding", pa.list_(pa.float32(), 128)),
            pa.field("model_version", pa.string()),
            pa.field("updated_at", pa.timestamp("us", tz="UTC")),
        ])
        
        empty_table = pa.table(
            {"user_id": [], "embedding": [], "model_version": [], "updated_at": []},
            schema=schema,
        )
        
        buf = BytesIO()
        pq.write_table(empty_table, buf)
        buf.seek(0)
        
        embeddings_key = f"models/{version}/user_embeddings.parquet"
        client.put_object(BUCKET_DATA, embeddings_key, buf, buf.getbuffer().nbytes)
        log.info(f"  ✓ Created {embeddings_key}")
        
        log.info("✓ Bootstrap data created")


    def main():
        try:
            client = get_minio_client()
            
            # 1. Create buckets
            create_bucket(client)
            
            # 2. Download and upload Triton models from GitHub
            download_and_upload_triton_models(client)
            
            # 3. Download and upload PyTorch model from GitHub
            download_and_upload_pytorch_model(client, BOOTSTRAP_VERSION)
            
            # 4. Create directory structure
            create_directory_structure(client)
            
            # 5. Create bootstrap data
            create_bootstrap_data(client, BOOTSTRAP_VERSION)
            
            log.info("\n=== Bucket Setup Complete ===")
            log.info(f"Buckets: {BUCKET_DATA}, {BUCKET_TRITON}")
            log.info(f"Models downloaded from: {GITHUB_REPO}")
            return 0
            
        except Exception as e:
            log.error(f"Bucket initialization failed: {e}", exc_info=True)
            return 1


    if __name__ == "__main__":
        sys.exit(main())
