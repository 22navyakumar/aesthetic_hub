---
# Usage: ansible-playbook create_ghcr_secret.yml -e "ghcr_pat=<your-PAT>"
# The PAT needs read:packages scope on ghcr.io/binti-p images.
# Never commit the actual token — pass it via -e or an Ansible vault.
- name: Create GHCR pull secret in aesthetic-hub namespace
  hosts: node1
  become: yes
  vars:
    ghcr_username: "binti-p"
    ghcr_email: "you@example.com"
    namespace: "aesthetic-hub"

  tasks:
    - name: Ensure namespace exists
      command: kubectl get namespace {{ namespace }}
      register: ns_check
      failed_when: false
      changed_when: false

    - name: Create namespace if missing
      when: ns_check.rc != 0
      command: kubectl create namespace {{ namespace }}

    - name: Check if ghcr-creds secret already exists
      command: kubectl get secret ghcr-creds -n {{ namespace }}
      register: secret_check
      failed_when: false
      changed_when: false

    - name: Create GHCR pull secret
      when: secret_check.rc != 0
      command: >
        kubectl create secret docker-registry ghcr-creds
        --namespace {{ namespace }}
        --docker-server=ghcr.io
        --docker-username={{ ghcr_username }}
        --docker-password={{ ghcr_pat }}
        --docker-email={{ ghcr_email }}

    - name: Update GHCR pull secret if it already exists
      when: secret_check.rc == 0
      shell: |
        kubectl create secret docker-registry ghcr-creds \
          --namespace {{ namespace }} \
          --docker-server=ghcr.io \
          --docker-username={{ ghcr_username }} \
          --docker-password={{ ghcr_pat }} \
          --docker-email={{ ghcr_email }} \
          --dry-run=client -o yaml | kubectl apply -f -
