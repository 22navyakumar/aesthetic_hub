---
- name: Clone repo and apply specific Argo WorkflowTemplates
  hosts: node1
  become: yes
  vars:
    repo_url: https://github.com/22navyakumar/aesthetic_hub.git
    repo_dest: /tmp/aesthetic_hub
    workflow_dir: k8s/workflows
    argo_namespace: argo
    templates:
      - argo-workflow-rbac.yaml
      - cron-train.yaml
      - event-trigger.yaml
      - promote-model.yaml
      - promote-serving.yaml
      - train-and-evaluate.yaml

  tasks:
    - name: Clone or update aesthetic_hub repo
      git:
        repo: "{{ repo_url }}"
        dest: "{{ repo_dest }}"
        version: main

    - name: Apply selected WorkflowTemplates to Argo namespace
      command: kubectl apply -n {{ argo_namespace }} -f {{ repo_dest }}/{{ workflow_dir }}/{{ item }}
      loop: "{{ templates }}"
      loop_control:
        label: "{{ item }}"

    - name: Verify applied WorkflowTemplates
      command: kubectl get workflowtemplates -n {{ argo_namespace }}
      register: wft_list

    - name: Show WorkflowTemplates
      debug:
        var: wft_list.stdout
