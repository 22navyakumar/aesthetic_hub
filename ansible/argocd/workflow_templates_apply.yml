---
- name: Clone repo and apply specific Argo WorkflowTemplates
  hosts: node1
  become: yes
  vars:
    repo_url: https://github.com/22navyakumar/aesthetic_hub.git
    repo_dest: /tmp/aesthetic_hub
    workflow_dir: k8s/workflows
    argo_namespace: argo
    argo_events_namespace: argo-events
    workflow_manifests:
      - argo-workflow-rbac.yaml
      - cron-train.yaml
      - promote-model.yaml
      - promote-serving.yaml
      - train-and-evaluate.yaml
    event_manifests:
      - event-trigger.yaml

  tasks:
    - name: Clone or update aesthetic_hub repo
      git:
        repo: "{{ repo_url }}"
        dest: "{{ repo_dest }}"
        version: "{{ lookup('env', 'BRANCH') | default('main', true) }}"

    - name: Apply selected workflow manifests
      command: kubectl apply -f {{ repo_dest }}/{{ workflow_dir }}/{{ item }}
      loop: "{{ workflow_manifests }}"
      loop_control:
        label: "{{ item }}"

    - name: Apply selected Argo Events manifests
      command: kubectl apply -f {{ repo_dest }}/{{ workflow_dir }}/{{ item }}
      loop: "{{ event_manifests }}"
      loop_control:
        label: "{{ item }}"

    - name: Verify applied WorkflowTemplates
      command: kubectl get workflowtemplates -n {{ argo_namespace }}
      register: wft_list

    - name: Show WorkflowTemplates
      debug:
        var: wft_list.stdout
