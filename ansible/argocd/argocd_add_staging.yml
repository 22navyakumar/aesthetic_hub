---
- name: Deploy Aesthetic Hub Staging via ArgoCD & Helm
  hosts: node1
  become: yes
  vars:
    app_name: aes-staging
    repo_url: https://github.com/22navyakumar/aesthetic_hub.git
    app_path: k8s/staging
    argocd_namespace: argocd
    target_namespace: aesthetic-hub-staging
    target_revision: "{{ lookup('env', 'BRANCH') | default('main', true) }}"

  tasks:

    - name: Get ArgoCD admin password
      command: >
        kubectl get secret -n {{ argocd_namespace }} argocd-initial-admin-secret \
        -o jsonpath="{.data.password}"
      register: argocd_password_b64

    - name: Decode ArgoCD password
      shell: echo {{ argocd_password_b64.stdout }} | base64 --decode
      register: argocd_password

    - name: Login to ArgoCD
      command: >
        argocd login localhost --username admin \
        --password "{{ argocd_password.stdout }}" \
        --grpc-web --port-forward --port-forward-namespace={{ argocd_namespace }}
      changed_when: false

    - name: Create aesthetic-hub-staging namespace if missing
      command: kubectl create namespace {{ target_namespace }}
      register: ns_create
      failed_when: ns_create.rc != 0 and "AlreadyExists" not in ns_create.stderr
      changed_when: "'created' in ns_create.stdout"

    - name: Copy Immich Postgres secret into staging namespace
      shell: |
        set -e
        password="$(kubectl get secret immich-postgres-secret -n aesthetic-hub -o jsonpath='{.data.password}' | base64 --decode)"
        kubectl create secret generic immich-postgres-secret \
          --namespace {{ target_namespace }} \
          --from-literal=password="$password" \
          --dry-run=client -o yaml | kubectl apply -f -
      args:
        executable: /bin/bash

    - name: Check if ArgoCD app exists
      command: argocd app get {{ app_name }} --port-forward --port-forward-namespace={{ argocd_namespace }}
      register: app_check
      failed_when: false
      changed_when: false

    - name: Create ArgoCD Helm app if not exists
      when: app_check.rc != 0
      command: >
        argocd app create {{ app_name }} \
        --repo {{ repo_url }} \
        --revision {{ target_revision }} \
        --path {{ app_path }} \
        --dest-server https://kubernetes.default.svc \
        --dest-namespace {{ target_namespace }} \
        --sync-policy automated --self-heal \
        --port-forward --port-forward-namespace={{ argocd_namespace }}

    - name: Update ArgoCD Helm app if exists
      when: app_check.rc == 0
      command: >
        argocd app set {{ app_name }} \
        --revision {{ target_revision }} \
        --dest-namespace {{ target_namespace }} \
        --port-forward --port-forward-namespace={{ argocd_namespace }}

    - name: Display ArgoCD app status
      command: argocd app get {{ app_name }} --port-forward --port-forward-namespace={{ argocd_namespace }}
      register: final_status

    - name: Show final status
      debug:
        var: final_status.stdout
