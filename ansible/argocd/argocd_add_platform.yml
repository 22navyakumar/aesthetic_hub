---
- name: Install Gateway API CRDs
  hosts: node1
  become: yes
  tasks:
    - name: Apply Gateway API CRDs with kubectl
      command: >
        kubectl apply -f
        https://github.com/kubernetes-sigs/gateway-api/releases/download/v1.1.0/standard-install.yaml

- name: Deploy MLflow platform via ArgoCD & Helm with secret handling
  hosts: node1
  become: yes
  vars:
    argocd_username: "admin"
    repo_path: "https://github.com/22navyakumar/aesthetic_hub.git"
    app_name: "aes-platform"
    app_path: "k8s/platform"
    platform_namespace: "platform"
    app_namespaces:
      - aesthetic-hub
      - aesthetic-hub-staging
      - aesthetic-hub-canary
      - argo
    repo_root: "/home/cc/aesthetic_hub"
    minio_access_key: "minioadmin"
    postgres_username: "mlflow"
    postgres_db: "mlflowdb"

  tasks:
    - name: Clone or update aesthetic_hub repo on node1 for platform bootstrap assets
      git:
        repo: "{{ repo_path }}"
        dest: "{{ repo_root }}"
        version: "{{ lookup('env', 'BRANCH') | default('main', true) }}"
        force: yes
      become_user: cc

    - name: Verify Triton model bootstrap assets exist on node1
      stat:
        path: "{{ repo_root }}/triton-models/{{ item }}"
      loop:
        - global_mlp/1/model.onnx
        - global_mlp/config.pbtxt
        - personalized_mlp/1/model.onnx
        - personalized_mlp/config.pbtxt
      register: triton_model_assets

    - name: Fail if Triton model bootstrap assets are missing
      fail:
        msg: >-
          Missing {{ repo_root }}/triton-models model files. Copy triton-models/
          into aesthetic_hub and run this playbook with BRANCH set to the branch
          Argo deploys, for example BRANCH=combined.
      when: triton_model_assets.results | selectattr('stat.exists', 'equalto', false) | list | length > 0

    - name: Get ArgoCD admin password from Kubernetes secret
      command: >
        kubectl get secret -n argocd argocd-initial-admin-secret \
        -o jsonpath="{.data.password}"
      register: argocd_password_base64

    - name: Decode ArgoCD admin password
      shell: echo {{ argocd_password_base64.stdout }} | base64 --decode
      register: argocd_password

    - name: Log in to ArgoCD
      command: >
        argocd login localhost --username {{ argocd_username }} \
        --password "{{ argocd_password.stdout }}" --grpc-web --port-forward --port-forward-namespace=argocd
      register: login_result
      changed_when: false

    - name: Add repository to ArgoCD
      command: >
        argocd repo add {{ repo_path }} --port-forward --port-forward-namespace=argocd
      register: repo_result
      changed_when: "'Repository already exists' not in repo_result.stderr"

    - name: Ensure platform namespace exists
      command: kubectl get namespace {{ platform_namespace }}
      register: ns_check
      failed_when: false
      changed_when: false

    - name: Create platform namespace if missing
      when: ns_check.rc != 0
      command: kubectl create namespace {{ platform_namespace }}

    - name: Ensure app and workflow namespaces that need MinIO credentials exist
      command: kubectl create namespace {{ item }}
      loop: "{{ app_namespaces }}"
      register: app_ns_create
      failed_when: app_ns_create.rc != 0 and "AlreadyExists" not in app_ns_create.stderr
      changed_when: "'created' in app_ns_create.stdout"

    - name: Check if MinIO secret already exists in platform namespace
      command: kubectl get secret minio-credentials -n {{ platform_namespace }}
      register: minio_secret_check
      failed_when: false
      changed_when: false

    - name: Generate MinIO secret key
      when: minio_secret_check.rc != 0
      set_fact:
        minio_secret_key: "{{ lookup('password', '/dev/null length=20 chars=ascii_letters,digits') }}"

    - name: Create MinIO credentials secret
      when: minio_secret_check.rc != 0
      command: >
        kubectl create secret generic minio-credentials
        --namespace {{ platform_namespace }}
        --from-literal=accesskey={{ minio_access_key }}
        --from-literal=secretkey={{ minio_secret_key }}
      register: minio_secret_create

    - name: Read MinIO credentials from platform namespace
      command: >
        kubectl get secret minio-credentials -n {{ platform_namespace }}
        -o jsonpath='{.data.accesskey} {.data.secretkey}'
      register: minio_secret_values
      changed_when: false

    - name: Copy MinIO credentials to dependent namespaces
      shell: |
        set -e
        accesskey="$(printf '%s' '{{ minio_secret_values.stdout.split()[0] }}' | base64 --decode)"
        secretkey="$(printf '%s' '{{ minio_secret_values.stdout.split()[1] }}' | base64 --decode)"
        kubectl create secret generic minio-credentials \
          --namespace {{ item }} \
          --from-literal=accesskey="$accesskey" \
          --from-literal=secretkey="$secretkey" \
          --dry-run=client -o yaml | kubectl apply -f -
      args:
        executable: /bin/bash
      loop: "{{ app_namespaces }}"

    - name: Check if MLflow Postgres secret already exists
      command: kubectl get secret mlflow-postgres-credentials -n {{ platform_namespace }}
      register: postgres_secret_check
      failed_when: false
      changed_when: false

    - name: Generate Postgres password
      when: postgres_secret_check.rc != 0
      set_fact:
        postgres_password: "{{ lookup('password', '/dev/null length=20 chars=ascii_letters,digits') }}"

    - name: Create Postgres credentials secret
      when: postgres_secret_check.rc != 0
      command: >
        kubectl create secret generic mlflow-postgres-credentials
        --namespace {{ platform_namespace }}
        --from-literal=username={{ postgres_username }}
        --from-literal=password={{ postgres_password }}
        --from-literal=dbname={{ postgres_db }}
      register: postgres_secret_create

    - name: Check if ArgoCD application exists
      command: >
        argocd app get {{ app_name }} --port-forward --port-forward-namespace=argocd
      register: app_check
      failed_when: false
      changed_when: false

    - name: Create ArgoCD Helm application if it does not exist
      when: app_check.rc != 0
      command: >
        argocd app create {{ app_name }} \
        --repo {{ repo_path }} \
        --path {{ app_path }} \
        --dest-server https://kubernetes.default.svc \
        --dest-namespace {{ platform_namespace }} \
        --port-forward --port-forward-namespace=argocd \
        --sync-policy automated --self-heal
      register: app_create

    - name: Update ArgoCD Helm application if it exists
      when: app_check.rc == 0
      command: >
        argocd app set {{ app_name }} \
        --dest-namespace {{ platform_namespace }} \
        --port-forward --port-forward-namespace=argocd
      register: app_update
